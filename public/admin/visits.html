<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Visits – Admin</title>
  <style>
    * { box-sizing: border-box; }
    body { font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif; margin: 0; background: #0b0f17; color: #e8eefc; }
    .wrap { max-width: 1600px; margin: 0 auto; padding: 20px; }
    h1 { margin: 0 0 16px; font-size: 1.5rem; }
    .toolbar { display: flex; flex-wrap: wrap; gap: 12px; align-items: center; margin-bottom: 16px; }
    .toolbar input[type="search"] { padding: 8px 12px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.2); background: rgba(0,0,0,0.3); color: #e8eefc; min-width: 200px; }
    .toolbar input[type="password"] { padding: 8px 12px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.2); background: rgba(0,0,0,0.3); color: #e8eefc; width: 180px; }
    .toolbar label { display: flex; align-items: center; gap: 8px; }
    .toolbar button { padding: 8px 14px; border-radius: 8px; border: 0; background: #5b8cff; color: #08101f; font-weight: 600; cursor: pointer; }
    .toolbar button:hover { background: #7aa0ff; }
    .meta { font-size: 13px; opacity: 0.85; margin-bottom: 12px; }
    .err { padding: 12px; border-radius: 8px; background: rgba(255,90,90,0.2); border: 1px solid rgba(255,90,90,0.4); margin-bottom: 12px; }
    .table-wrap { overflow-x: auto; border-radius: 12px; border: 1px solid rgba(255,255,255,0.12); }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th, td { padding: 10px 12px; text-align: left; border-bottom: 1px solid rgba(255,255,255,0.08); }
    th { background: rgba(255,255,255,0.08); font-weight: 600; white-space: nowrap; cursor: pointer; user-select: none; }
    th:hover { background: rgba(255,255,255,0.12); }
    th .sort-icon { opacity: 0.6; margin-left: 4px; }
    tbody tr:hover { background: rgba(255,255,255,0.04); }
    td { max-width: 280px; overflow: hidden; text-overflow: ellipsis; }
    .ua { font-size: 11px; max-width: 220px; }
    .empty { padding: 40px; text-align: center; opacity: 0.7; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Visits</h1>
    <div class="toolbar">
      <label>
        Token: <input type="password" id="token" placeholder="Admin token" autocomplete="off" />
      </label>
      <button type="button" id="load">Load</button>
      <label style="margin-left: 8px;">
        Search: <input type="search" id="search" placeholder="Filter by any text…" />
      </label>
    </div>
    <p class="meta" id="meta"></p>
    <div id="error" class="err" style="display: none;"></div>
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th data-sort="created_at">Time <span class="sort-icon" aria-hidden="true">↕</span></th>
            <th data-sort="ip">IP</th>
            <th data-sort="phone_from_url">Phone (from link)</th>
            <th data-sort="ua">User-Agent</th>
            <th data-sort="timezone">Timezone</th>
            <th data-sort="platform">Platform</th>
            <th data-sort="screen_w">Screen</th>
            <th data-sort="viewport_w">Viewport</th>
            <th data-sort="language">Language</th>
          </tr>
        </thead>
        <tbody id="tbody"></tbody>
      </table>
    </div>
    <p class="empty" id="empty" style="display: none;">No visits match the search.</p>
  </div>
  <script src="/admin/visits.js"></script>
</body>
</html>
